<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Expiry Tracker</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="loginOverlay" class="login-overlay">
    <div class="login-modal">
      <div class="login-modal-header">
        <span class="login-icon">📋</span>
        <h2>Product Expiry Tracker</h2>
        <p>Sign in to manage your inventory</p>
      </div>
      <button id="googleSignInBtn" class="btn btn-google">
        <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.611 20.083H42V20H24v8h11.303c-1.649 4.657-6.08 8-11.303 8-6.627 0-12-5.373-12-12s5.373-12 12-12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 12.955 4 4 12.955 4 24s8.955 20 20 20 20-8.955 20-20c0-1.341-.138-2.65-.389-3.917z"/><path fill="#FF3D00" d="m6.306 14.691 6.571 4.819C14.655 15.108 18.961 12 24 12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 16.318 4 9.656 8.337 6.306 14.691z"/><path fill="#4CAF50" d="M24 44c5.166 0 9.86-1.977 13.409-5.192l-6.19-5.238A11.91 11.91 0 0 1 24 36c-5.202 0-9.619-3.317-11.283-7.946l-6.522 5.025C9.505 39.556 16.227 44 24 44z"/><path fill="#1976D2" d="M43.611 20.083H42V20H24v8h11.303a12.04 12.04 0 0 1-4.087 5.571l.003-.002 6.19 5.238C36.971 39.205 44 34 44 24c0-1.341-.138-2.65-.389-3.917z"/></svg>
        Sign In with Google
      </button>
    </div>
  </div>

  <div class="container" id="appContainer" style="display:none">
    <header>
      <div class="header-left">
        <h1>Product Expiry Tracker</h1>
      </div>
      <div class="header-right">
        <div id="userProfile" class="user-profile" style="display:none">
          <img id="userPhoto" class="user-avatar" src="" alt="Avatar">
          <span id="userName" class="user-name"></span>
          <button id="logoutBtn" class="btn btn-secondary btn-sm">Logout</button>
        </div>
        <button id="addProductBtn" class="btn btn-primary">+ Add Product</button>
      </div>
    </header>

    <input type="file" id="fileInput" accept=".json" style="display:none">

    <section class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6" id="dashboard">
      <div class="stat-card">
        <span class="stat-icon">📦</span>
        <div class="stat-info">
          <span class="stat-label">Total Products</span>
          <span class="stat-value" id="totalProducts">0</span>
        </div>
      </div>
      <div class="stat-card warning">
        <span class="stat-icon">⚠️</span>
        <div class="stat-info">
          <span class="stat-label">Expiring in 8.5 Months</span>
          <span class="stat-value" id="expiringSoon">0</span>
        </div>
      </div>
    </section>

    <div class="modal-overlay" id="modalOverlay">
      <div class="modal">
        <div class="modal-header">
          <h2 id="modalTitle">Add Product</h2>
          <button class="modal-close" id="modalClose">&times;</button>
        </div>
        <form id="productForm">
          <input type="hidden" id="productId" value="">
          <div class="form-group">
            <label for="product_name">Product Name</label>
            <input type="text" id="product_name" placeholder="Enter product name" required>
          </div>
          <div class="form-group">
            <label for="batch_number">Batch Number</label>
            <input type="text" id="batch_number" placeholder="Enter batch number" required>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="mfg_date">Manufacturing Date</label>
              <input type="date" id="mfg_date" required>
            </div>
            <div class="form-group">
              <label for="expiry_date">Expiry Date</label>
              <input type="date" id="expiry_date" required>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="inward">Inward Stock</label>
              <input type="text" id="inward" value="0" placeholder="e.g. 1500 or 1500+400">
            </div>
            <div class="form-group">
              <label for="outward">Outward Stock</label>
              <input type="text" id="outward" value="0" placeholder="e.g. 200 or 200+50">
            </div>
          </div>
          <div class="form-actions">
            <button type="button" class="btn btn-secondary" id="cancelBtn">Cancel</button>
            <button type="submit" class="btn btn-primary" id="submitBtn">Save Product</button>
          </div>
        </form>
        <div class="form-error" id="formError"></div>
      </div>
    </div>

    <section class="table-section">
      <div class="table-header">
        <h2>Inventory</h2>
        <div class="search-bar">
          <input type="text" id="searchInput" placeholder="Search products...">
        </div>
      </div>
      <div class="table-wrapper">
        <table id="inventory-table">
          <thead>
            <tr>
              <th><input type="checkbox" id="selectAllCheckbox" onchange="toggleSelectAll(this)"></th>
              <th>Product Name</th>
              <th>Batch Number</th>
              <th>Mfg Date</th>
              <th>Expiry Date</th>
              <th>Months Left</th>
              <th>Inward</th>
              <th>Outward</th>
              <th>Balance Stock</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="productsBody"></tbody>
        </table>
      </div>
    </section>

    <div class="custom-utility-wrapper">
      <div class="custom-utility-card">
        <button id="btn-export-csv" class="custom-btn btn-secondary">
          <span class="btn-icon">📄</span> Export Excel/CSV
        </button>
        <button id="btn-export-json" class="custom-btn btn-secondary">
          <span class="btn-icon">📥</span> Export Backup (JSON)
        </button>
        <button id="btn-import-json" class="custom-btn btn-secondary">
          <span class="btn-icon">📤</span> Import Backup
        </button>
        <button id="btn-print-pdf" class="custom-btn btn-secondary">
          <span class="btn-icon">🖨️</span> Print Table PDF
        </button>
        <button id="btn-print-selected" class="custom-btn btn-secondary">
          <span class="btn-icon">🖨️</span> Print Selected (PDF)
        </button>
        <button id="btn-download-image" class="custom-btn btn-secondary">
          <span class="btn-icon">🖼️</span> Download Selected as Image
        </button>
      </div>
    </div>
  </div>

  <!-- Notes Side Canvas Drawer -->
  <div id="notesCanvas" class="notes-canvas-overlay">
    <div class="notes-canvas">
      <div class="notes-canvas-header">
        <h3 id="notesCanvasTitle">Notes</h3>
        <button id="notesCanvasClose" class="notes-canvas-close">&times;</button>
      </div>
      <div class="notes-canvas-body">
        <textarea id="notesTextarea" placeholder="Write your notes here..."></textarea>
      </div>
      <div class="notes-canvas-footer">
        <button id="notesSaveBtn" class="btn btn-primary">Save Note</button>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
